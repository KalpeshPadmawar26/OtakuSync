<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Anime | OtakuSync</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div style="display: flex; align-items: center; gap: 12px; position: relative;">
            <button class="mobile-nav-toggle" id="mobileToggle" onclick="toggleMobileNav()" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
            <div class="hamburger" onclick="app.toggleFloatingMenu()">☰</div>
            <div class="floating-menu" id="floatingMenu">
                <a href="#action-section" onclick="app.scrollToId('action-section', event)">💥 Action</a>
                <a href="#romance-section" onclick="app.scrollToId('romance-section', event)">❤️ Romance</a>
                <a href="#dark-section" onclick="app.scrollToId('dark-section', event)">🔪 Dark</a>
                <a href="#scifi-section" onclick="app.scrollToId('scifi-section', event)">🚀 Sci-Fi</a>
            </div>
            <div class="logo"><a href="index.html">OtakuSync</a></div>
        </div>
        <ul class="nav-links desktop-links">
            <li><a href="index.html">Home</a></li>
            <li id="navDashboard" class="hidden"><a href="dashboard.html">Dashboard</a></li>
            <li class="active"><a href="start.html">Start Anime</a></li>
            <li><a href="chat.html">Community</a></li>
        </ul>
        <div id="userMenu" class="hidden">
            <span id="welcomeText" style="margin-right: 12px; font-weight: bold; font-size: 0.9rem;"></span>
            <button class="logout-btn" onclick="app.logout()">Logout</button>
        </div>
    </nav>

    <!-- Mobile Nav Drawer -->
    <div class="mobile-nav-overlay" id="mobileOverlay" onclick="closeMobileNav()"></div>
    <div class="mobile-nav-drawer" id="mobileDrawer">
        <a href="index.html">Home</a>
        <a href="dashboard.html" id="mobileNavDashboard">Dashboard</a>
        <a href="start.html" class="active">Start Anime</a>
        <a href="chat.html">Community</a>
    </div>

    <main style="padding-top: calc(var(--navbar-height) + 20px); padding-bottom: 60px;">
        <div style="text-align:center; padding: 30px 20px 10px;">
            <h1 style="font-size: 2.4rem; color: var(--primary-color); font-weight: 800;">Discover Your First Anime</h1>
            <p style="color: var(--text-muted); font-size: 1rem; margin-top: 10px; max-width: 560px; margin-inline: auto;">
                Browse curated starter picks by genre. Find what matches your vibe.
            </p>
        </div>
        <div id="startersContainer">
            <div class="loading" style="text-align:center; padding: 40px;">Loading curated picks...</div>
        </div>
    </main>

    <div id="notificationArea"></div>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="js/genres.js"></script>
    <script src="js/app.js"></script>
    <script>
        function toggleMobileNav() {
            document.getElementById('mobileToggle').classList.toggle('open');
            document.getElementById('mobileDrawer').classList.toggle('open');
            document.getElementById('mobileOverlay').classList.toggle('show');
        }
        function closeMobileNav() {
            document.getElementById('mobileToggle').classList.remove('open');
            document.getElementById('mobileDrawer').classList.remove('open');
            document.getElementById('mobileOverlay').classList.remove('show');
        }

        document.addEventListener('DOMContentLoaded', () => {
            app.initStarters();
        });
    </script>
</body>
</html>
