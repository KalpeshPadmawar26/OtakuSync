<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Categories | OtakuSync</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .category-page-header {
            padding: 40px 24px 20px;
            max-width: 1300px;
            margin: 80px auto 0;
        }
        .category-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 10px;
        }
        .category-meta {
            color: var(--text-muted);
            margin-bottom: 30px;
        }
        .load-more-container {
            display: flex;
            justify-content: center;
            margin: 50px 0;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-left">
            <div class="logo"><a href="index.html" onclick="app.goHome(event)">OtakuSync</a></div>
            <ul class="nav-links" id="desktopNavLinks">
                <li><a href="start.html" onclick="app.goStart(event)">Start Anime</a></li>
                <li><a href="chat.html" onclick="app.goCommunity(event)">Community</a></li>
            </ul>
        </div>
        <div class="navbar-right">
            <form class="search-container" id="mainSearch" onsubmit="event.preventDefault(); app.handleFormSearch();">
                <input type="text" class="search-bar" placeholder="Search anime..." oninput="app.handleSearch(this.value)">
                <div id="searchResults" class="search-results hidden"></div>
            </form>
            <div class="profile-container" id="profileContainer">
                <div class="profile-circle" id="profileIcon" onclick="app.toggleProfileMenu(event)">
                    <i>👤</i>
                </div>
                <div class="profile-dropdown" id="profileDropdown">
                    <div id="authButtons">
                        <a onclick="app.showAuthModal('login')">Login</a>
                        <a onclick="app.showAuthModal('register')">Register</a>
                    </div>
                    <div id="userMenu" class="hidden">
                        <div id="dropdownUser" class="dropdown-header"></div>
                        <a href="dashboard.html">My Dashboard</a>
                        <a onclick="app.logout()">Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="category-page-header">
        <h1 id="categoryTitle" class="category-title">Explore</h1>
        <p id="categoryCount" class="category-meta">Discover the best anime in this category.</p>
        
        <div class="anime-grid" id="categoryGrid">
            <!-- Data populated by app.js -->
        </div>

        <div class="load-more-container">
            <button id="loadMoreBtn" class="btn-primary" onclick="app.loadMoreCategory()">Load More</button>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav" id="bottomNav"></div>

    <!-- Auth Modal -->
    <div id="authModal" class="modal hidden">
        <div class="modal-content">
            <span class="close" onclick="app.hideAuthModal()">&times;</span>
            <h2 id="modalTitle">Login</h2>
            <input type="text" id="authUsername" placeholder="Username" class="auth-input">
            <input type="email" id="authEmail" placeholder="Email" class="auth-input hidden">
            <input type="password" id="authPassword" placeholder="Password" class="auth-input">
            <input type="password" id="authConfirmPassword" placeholder="Confirm Password" class="auth-input hidden">
            <button id="authSubmit" class="login-btn auth-submit">Submit</button>
            <div id="authError" class="error-text"></div>
        </div>
    </div>

    <div id="notificationArea"></div>

    <script src="js/genres.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            app.initCategoryPage();
        });
    </script>
</body>
</html>
