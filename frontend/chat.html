<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Chat | OtakuSync</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div style="display: flex; align-items: center; gap: 15px; position: relative;">
            <div class="hamburger" onclick="app.toggleFloatingMenu()">☰</div>
            <div class="floating-menu" id="floatingMenu">
                <a href="index.html#trending">Top Anime</a>
                <a href="index.html#airing">Airing Anime</a>
                <a href="index.html#upcoming">Upcoming Anime</a>
            </div>
            <div class="logo"><a href="index.html">OtakuSync</a></div>
        </div>
        <ul class="nav-links desktop-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li class="active"><a href="chat.html">Community</a></li>
        </ul>
        <div id="userMenu">
            <span id="welcomeText" style="margin-right: 15px; font-weight: bold;"></span>
            <button class="logout-btn" onclick="app.logout()">Logout</button>
        </div>
    </nav>

    <main class="chat-main" style="padding-top: 100px;">
        <div class="chat-container">
            <div class="chat-sidebar">
                <h3>Genres</h3>
                <ul id="genreList">
                    <li onclick="app.joinChatRoom('Action', this)" class="active">🔥 Action</li>
                    <li onclick="app.joinChatRoom('Romance', this)">💖 Romance</li>
                    <li onclick="app.joinChatRoom('Comedy', this)">😂 Comedy</li>
                    <li onclick="app.joinChatRoom('Slice of Life', this)">🌟 Slice of Life</li>
                    <li onclick="app.joinChatRoom('Fantasy', this)">🧙 Fantasy</li>
                    <li onclick="app.joinChatRoom('Sci-Fi', this)">🚀 Sci-Fi</li>
                    <li onclick="app.joinChatRoom('Horror', this)">💀 Horror</li>
                </ul>
            </div>
            <div class="chat-window">
                <div class="chat-header">
                    <h3 id="currentRoomName">🔥 Action Room</h3>
                    <span style="font-size: 0.8rem; color:#aaa;">24 Hour Auto-Delete</span>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div style="text-align:center;color:#666;padding:20px;">Connecting to chat...</div>
                </div>
                <form class="chat-input-area" onsubmit="event.preventDefault(); app.sendChatMessage();">
                    <input type="text" id="chatInput" placeholder="Type a message..." autocomplete="off" required>
                    <button type="submit" class="btn-primary">Send</button>
                </form>
            </div>
        </div>
    </main>

    <div id="notificationArea"></div>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('token')) {
                window.location.href = 'index.html';
                return;
            }
            app.initChat();
        });
    </script>
</body>
</html>
