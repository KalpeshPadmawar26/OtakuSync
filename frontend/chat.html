<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Chat | OtakuSync</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-left">
            <div class="logo"><a href="index.html" onclick="app.goHome(event)">OtakuSync</a></div>
            <ul class="nav-links" id="desktopNavLinks">
                <li><a href="start.html" onclick="app.goStart(event)">Start Anime</a></li>
                <li class="active"><a href="chat.html" onclick="app.goCommunity(event)">Community</a></li>
            </ul>
        </div>

        <div class="navbar-right">
            <form class="search-container" id="mainSearch" onsubmit="event.preventDefault(); app.handleFormSearch();">
                <input type="text" class="search-bar" placeholder="Search anime..." oninput="app.handleSearch(this.value)">
                <div id="searchResults" class="search-results hidden"></div>
            </form>
            <div class="profile-container" id="profileContainer">
                <div class="profile-circle" id="profileIcon" onclick="app.toggleProfileMenu(event)">
                    <i>👤</i>
                </div>
                <div class="profile-dropdown" id="profileDropdown">
                    <div id="authButtons">
                        <a onclick="app.showAuthModal('login')">Login</a>
                        <a onclick="app.showAuthModal('register')">Register</a>
                    </div>
                    <div id="userMenu" class="hidden">
                        <div id="dropdownUser" class="dropdown-header"></div>
                        <a href="dashboard.html">My Dashboard</a>
                        <a onclick="app.logout()">Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="bottom-nav" id="bottomNav"></div>

    <div id="chatOverlay" class="chat-overlay"></div>
    <main class="chat-main">
        <div class="chat-container">
            <div class="chat-sidebar" id="chatSidebar">
                <div class="chat-sidebar-header">
                    <h3>Genre Rooms</h3>
                    <button id="closeRoomsBtn" class="chat-rooms-close" type="button">✕</button>
                </div>
                <ul id="genreList">
                    <!-- Populated dynamically from MASTER_GENRES -->
                    <li class="loading" style="font-size:0.8rem; padding: 10px 20px;">Loading...</li>
                </ul>
            </div>
            <div class="chat-window">
                <div class="chat-header">
                    <div class="chat-header-left">
                        <button id="roomPickerBtn" class="chat-room-picker" type="button">☰</button>
                        <h3 id="currentRoomName">🔥 Action Room</h3>
                        <span class="chat-room-subtitle">24h auto-delete</span>
                    </div>
                    <div class="notification-controls">
                        <label class="switch-label">Mention Notifications</label>
                        <label class="switch">
                            <input type="checkbox" id="notifyToggle" onchange="app.updateNotificationPreference(this.checked)" checked>
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div style="text-align:center;color:#555;padding:30px;">Connecting to chat...</div>
                </div>
                <form class="chat-input-area" onsubmit="event.preventDefault(); app.sendChatMessage();">
                    <input type="text" id="chatInput" placeholder="Type a message..." autocomplete="off" required>
                    <button type="submit" class="btn-primary">Send</button>
                </form>
            </div>
        </div>
    </main>

    <div id="notificationArea"></div>
    <div id="authModal" class="modal hidden">
        <div class="modal-content">
            <span class="close" onclick="app.hideAuthModal()">&times;</span>
            <h2 id="modalTitle">Login</h2>
            <input type="text" id="authUsername" placeholder="Username" class="auth-input">
            <input type="email" id="authEmail" placeholder="Email" class="auth-input hidden">
            <input type="password" id="authPassword" placeholder="Password" class="auth-input">
            <input type="password" id="authConfirmPassword" placeholder="Confirm Password" class="auth-input hidden">
            <button id="authSubmit" class="login-btn auth-submit">Submit</button>
            <div id="authError" class="error-text"></div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="js/genres.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Genre emoji map
        const GENRE_EMOJI = {
            Action:'⚡', Adventure:'🗺️', Comedy:'😂', Romance:'❤️', Fantasy:'🔮',
            Horror:'💀', Mystery:'🕵️', Drama:'🎭', 'Slice of Life':'🌟', 'Sci-Fi':'🚀',
            Thriller:'🔪', Psychological:'🧠', Supernatural:'👻', Mecha:'🤖',
            Sports:'⚽', Music:'🎵', Historical:'⚔️', Isekai:'🌀', Samurai:'🗡️',
            Military:'🪖', Magic:'✨', School:'📚', Parody:'🎭', Space:'🌌',
            Vampire:'🧛', Shounen:'💪', Shoujo:'🌸', Seinen:'📖', Josei:'💐',
            'Martial Arts':'🥋', 'Super Power':'💥', Police:'🚔', Game:'🎮',
            Kids:'🧸', Demons:'😈', Harem:'🌸', 'Time Travel':'⏰',
            'Psychological Thriller':'🌀', Dementia:'🌀', Cars:'🏎️'
        };

        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('token')) {
                window.location.href = 'index.html';
                return;
            }

            // Populate genre sidebar from MASTER_GENRES
            const list = document.getElementById('genreList');
            list.innerHTML = MASTER_GENRES.map((g, i) => `
                <li onclick="app.joinChatRoom('${g}', this)" ${i===0 ? 'class="active"' : ''}>
                    ${GENRE_EMOJI[g] || '💬'} ${g}
                </li>
            `).join('');

            app.initChat();
        });
    </script>
</body>
</html>
