<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Genres | OtakuSync</title>
    <meta name="description" content="Explore top anime by genre on OtakuSync. Find top picks, currently airing, and recommended anime tailored to your favorite genres.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://otakusync.vercel.app/genre.html">
    <meta property="og:title" content="Anime Genres | OtakuSync">
    <meta property="og:description" content="Explore the best anime across all genres on OtakuSync.">
    <meta property="og:url" content="https://otakusync.vercel.app/genre.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="css/style.css"></noscript>
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="navbar-left">
            <div class="logo"><a href="/" aria-label="OtakuSync Home">OtakuSync</a></div>
            <ul class="nav-links" id="desktopNavLinks" role="list">
                <li role="listitem"><a href="start.html">Start Anime</a></li>
                <li role="listitem"><a href="chat.html">Community</a></li>
            </ul>
        </div>

        <div class="navbar-right">
            <form class="search-container" id="mainSearch" role="search" aria-label="Search anime" onsubmit="event.preventDefault(); app.handleFormSearch();">
                <label for="searchInput" class="sr-only">Search anime</label>
                <input type="search" id="searchInput" class="search-bar" placeholder="Search anime..." autocomplete="off" oninput="app.handleSearch(this.value)" aria-label="Search anime">
                <div id="searchResults" class="search-results hidden" role="listbox"></div>
            </form>
            <div class="profile-container" id="profileContainer">
                <button class="profile-circle" id="profileIcon" onclick="app.toggleProfileMenu(event)" aria-haspopup="true" aria-expanded="false" aria-label="Account menu">
                    <i data-lucide="user"></i>
                </button>
                <div class="profile-dropdown" id="profileDropdown" role="menu">
                    <div id="authButtons">
                        <a href="#" onclick="event.preventDefault(); app.showAuthModal('login')" role="menuitem">Login</a>
                        <a href="#" onclick="event.preventDefault(); app.showAuthModal('register')" role="menuitem">Register</a>
                    </div>
                    <div id="userMenu" class="hidden">
                        <div id="dropdownUser" class="dropdown-header" role="menuitem"></div>
                        <a href="dashboard.html" role="menuitem">My Dashboard</a>
                        <a href="#" onclick="event.preventDefault(); app.logout()" role="menuitem">Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <nav class="bottom-nav" id="bottomNav" aria-label="Mobile navigation"></nav>

    <main style="padding-top: 100px; padding-bottom: 50px;" aria-labelledby="genreTitle">
        <div style="text-align:center; padding: 20px;">
            <h1 style="font-size: 3rem; color: var(--primary-color);" id="genreTitle">Loading Genre...</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem; margin-top: 10px;">Explore the best anime from this category.</p>
        </div>
        
        <section class="section" id="top-picks-section" aria-labelledby="top-picks-heading">
            <h2 class="section-title" id="top-picks-heading"><i data-lucide="trophy" class="title-icon"></i> Top Picks</h2>
            <div class="horizontal-scroll" id="genreTopList" aria-live="polite">
                <div class="loading" role="status">Loading...</div>
            </div>
        </section>

        <section class="section" id="airing-now-section" aria-labelledby="airing-now-heading">
            <h2 class="section-title" id="airing-now-heading"><i data-lucide="play-circle" class="title-icon"></i> Airing Now</h2>
            <div class="horizontal-scroll" id="genreAiringList" aria-live="polite">
                <div class="loading" role="status">Loading...</div>
            </div>
        </section>

        <section class="section" id="recommended-section" aria-labelledby="recommended-heading">
            <h2 class="section-title" id="recommended-heading"><i data-lucide="lightbulb" class="title-icon"></i> Recommended</h2>
            <div class="horizontal-scroll" id="genreRecommendedList" aria-live="polite">
                <div class="loading" role="status">Loading...</div>
            </div>
        </section>
    </main>

    <div id="authModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-content">
            <button class="close" onclick="app.hideAuthModal()" aria-label="Close">&times;</button>
            <h2 id="modalTitle">Login</h2>
            <label for="authUsername" class="sr-only">Username</label>
            <input type="text" id="authUsername" placeholder="Username" class="auth-input" autocomplete="username">
            <label for="authEmail" class="sr-only">Email</label>
            <input type="email" id="authEmail" placeholder="Email" class="auth-input hidden" autocomplete="email">
            <label for="authPassword" class="sr-only">Password</label>
            <input type="password" id="authPassword" placeholder="Password" class="auth-input" autocomplete="current-password">
            <label for="authConfirmPassword" class="sr-only">Confirm Password</label>
            <input type="password" id="authConfirmPassword" placeholder="Confirm Password" class="auth-input hidden" autocomplete="new-password">
            <button id="authSubmit" class="login-btn auth-submit">Submit</button>
            <div id="authError" class="error-text" role="alert"></div>
        </div>
    </div>

    <div id="notificationArea" role="status" aria-live="polite"></div>
    <script src="js/genres.js" defer></script>
    <script src="js/app.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => { 
            app.initGenreDetails(); 
            lucide.createIcons();
        });
    </script>
</body>
</html>
